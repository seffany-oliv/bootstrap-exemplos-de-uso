<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Promoções da Loja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Centralizar o carrossel */
        .carousel-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 20px;
        }
        .carousel-inner img {
            margin: auto;
        }
    </style>
</head>
<body>

    

    <nav class="navbar navbar-expand-lg navbar-light bg-black">
        <div class="container">
            <!-- Logo -->
             <h2 class="text-nav text-light">Minha Loja</h2>

             <!-- Botão Menu Hamburguer -->
              <button class="navbar-toggler text-light" type="button" data-bs-toggle="collapse" data-bs-target="#minhaNavbar">
                <span class="navbar-toggler-icon text-light" style="filter: invert(1);"></span>
              </button>

             <!-- Links -->
             <div class="collapse navbar-collapse" id="minhaNavbar">
              <div class="navbar-nav ms-auto">
              <a href="#" class="navbar-link text-light m-3"><i class="bi bi-house text-light fs-3 pe-1">Home</i></a>
              <a href="#" class="navbar-link text-light m-3"><i class="bi bi-person text-light fs-3 pe-1">Perfil</i></a>
              <a href="#" class="navbar-link text-light m-3"><i class="bi bi-envelope text-light fs-3 pe-1">Mensagens</i></a>
              </nav>

              <!-- Carroussel de slides -->
              <div class="container mt-3">
        <div id="carouselExemplo" class="carousel slide" data-bs-ride="carousel" style="width:40%; margin:auto; ">
            <div class="carousel-inner">
                <!-- Primeiro item do carroussel -->
                <div class="carousel-item active">
                    <img src="https://placehold.co/600x400/000/fff" alt="Slide-1" class=" d-block w-100">
                </div>

                <!-- Segundo item do carroussel -->
                <div class="carousel-item">
                    <img src="https://placehold.co/600x400/orange/fff" alt="Slide-2" class=" d-block  w-100">
                </div>

                <!-- Terceiro item do carroussel -->
                <div class="carousel-item ">
                    <img src="https://placehold.co/600x400/gray/000" alt="Slide-3" class="d-block  w-100">
                </div>
            </div>

            <!-- Adicionando botõesde controle do Carroussel -->
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            </button>

            <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            </button>
            </div>

            <h2 class="text mt-4" style="text-align: center;">Desbloqueie seu Desconto!</h2>


             <!-- BARRA DE PROGRESSO -->
                <h5 class="mt-4">Progresso:</h>
                <div class="progress mb-3">
                    <div class="progress-bar" id="progress-bar" role="progressbar"style="width: 0%;">0%</div>
                </div>
                <button id="increase-progress"  class="btn btn-primary">Ganhar Desconto</button>
        </div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>


    document.getElementById('increase-progress').addEventListener('click', function() {
        let progressBar = document.getElementById('progress-bar');
        let width = parseInt(progressBar.style.width);
        
        if (width < 100) {
            width += 1;
            progressBar.style.width = width + "%";
            progressBar.textContent = width + "%";

            if (width === 100) {
                alert("🎉 Parabéns! Você desbloqueou um desconto especial!");
            }
        }
    });
</script>

</body>
</html>

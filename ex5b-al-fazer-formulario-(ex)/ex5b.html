<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

     <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <!-- CSS customizado -->
    <link rel="stylesheet" href="styles.css">
   

</head>
<body style="
  background-image: url('img/download (3).jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
">
         
    <!-- Email -->
   <div class="container mt-5" style="padding:100px; background-color:rgba(234, 3, 134, 0.919); width: 500px; border-radius: 35px;">
        <form class="custom-form">
            <!-- Campo para e-mail -->
             <h2 class="text mt-4 mb-5                                                                  " style="text-align: center; color:rgb(249, 200, 223)">Login</h2>
           <div class="col-sm-6 mb-3" >
                <div class="input-group" style="width:300px">
                    <span class="input-group-text custom-icon" style="background-color: rgb(255, 153, 201);">
                        <i class="bi bi-person"></i>
                    </span>
                <input type="text" class="form-control custom-input" placeholder="Digite seu email" >
            </div>
        </div>



    <!-- Senha -->
       <div class="col-sm-6 mb-3" >
                <div class="input-group" style="width:300px">
                    <span class="input-group-text custom-icon"style="background-color: rgb(255, 153, 201);">
                        <i class="bi bi-lock-fill"></i>
                    </span>
                <input type="password" class="form-control custom-input" placeholder="Digite sua senha" >
            </div>
        </div>


    <!-- Botão para enviar -->
    <button type="submit" class="btn btn-warning custom-buttom" style="width:300px">Enviar</button>
        </form>
    </div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

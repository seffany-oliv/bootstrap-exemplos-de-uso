<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Botões Bootstrap</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap ícones -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

</head>
<body>

    <!-- Botões Normais -->
    <div class="container d-flex justify-content-center mt-3">
        <button class="btn btn-primary">Azul</button>
        <button class="btn btn-danger ms-3">Vermelho</button>
        <button class="btn btn-secondary ms-3">Cinza</button>
        <button class="btn btn-success ms-3">Verde</button>
        <button class="btn btn-warning ms-3">Laranja</button>
        <button class="btn btn-info ms-3">Azul Claro</button>
    </div>
     
    <!-- Botão com ícone -->
     <div class="container d-flex justify-content-center p-3 mt-5 bg-black ">
        <button class="btn btn-primary">
            <i class=" bi bi-search pe-2"></i>Perquisar
        </button>

         <button class="btn btn-primary ms-3">
            <i class="bi bi-spotify pe-2"></i>Perquisar
        </button>

         <button class="btn btn-primary ms-3">
            <i class="bi bi-facebook pe-2"></i>Perquisar
        </button>
     </div>

    


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

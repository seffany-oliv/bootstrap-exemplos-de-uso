<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts e Progress Bar Bootstrap Interativos</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-3">

        <!-- ================================
             BOTÕES DE CONTROLE DOS ALERTS
             ================================ -->
    <div class= mb-3">
     <button class="btn btn-success me-2" onclick="mostrarSucesso()">Mostrar sucesso</button>
     <button class="btn btn-danger me-2" onclick="mostrarErro()">Mostrar Erro</button>
     <button class="btn btn-warning" onclick="mostrarToast()">Mostrar Toast</button>
    </div>

        <!-- ================================
             ALERT DE SUCESSO
             Começa sem a classe "show", ou seja, invisível.
             O JS adiciona "show" ao clicar no botão.
             ================================ -->

     <div class="alert alert-success alert-dismissible fade" id="successAlert">
          <strong>Sucesso!</strong>Opereção realizeda com sucesso!
          <button class="bnt-close" type="button" onclick="fecharAlert()"></button>
     </div>


        <!-- ================================
             ALERT DE ERRO
             Mesmo comportamento do alert de sucesso.
             ================================ -->
        <div class="alert alert-danger alert-dismissible fade" id="errorAlert">
            <strong>Erro!</strong> Erro ao processar a operação!
            <button type="button" class="btn-close" onclick="fecharAlert('errorAlert')"></button>
        </div>

        <!-- ================================
             TOAST (NOTIFICAÇÃO FLUTUANTE)
             Posicionado no canto superior direito via Bootstrap.
             O JS usa a classe Bootstrap Toast para exibir/ocultar.
             ================================ -->

     <div class="position-fixed top-0 end-0 p-3" style="z-index: 10;;">
          <div id="liveToast" class="toast" role="alert" aria-atomic="true">
               <div class="toast-header">
                    <strong class="me-auto">Notificação</strong>
                    <small>Agora</small>
                    <button class="btn-close" type="button" data-bs-dismiss="toast"></button>
               </div>
               <div class="toast-body">
                    Esta é uma mensagem de toast!
               </div>
          </div>
     </div>

        <!-- ================================
             BARRA DE PROGRESSO
             Começa em 0%. O JS atualiza o width e o texto.
             A animação shimmer é ativada/desativada pelo JS
             adicionando/removendo a classe "barra-shimmer".
             ================================ -->
        <h5 class="mt-4">Progresso:</h5>
        <div class="progress mb-3">
            <div class="progress-bar"
                 id="dynamicProgress"
                 role="progressbar"
                 style="width: 0%;">
                0%
            </div>
        </div>

        <!-- ================================
             CONTROLES DA BARRA DE PROGRESSO
             Botões para aumentar/diminuir e ligar/desligar a animação.
             ================================ -->
        <div class="btn-group me-2">
          <button class="btn btn-primary" onclick="updateProgress(-10)">-10%</button>
        </div>
        <div class="btn-group me-2">
          <button class="btn btn-primary" onclick="updateProgress(10)">+10%</button>
        </div>

     <button class="btn btn-success" id="toggleAnimationBtn" onclick="toggleAnimacao()">
          Ligar animação
     </button>

    </div>

    <!-- Bootstrap JS (necessário para o componente Toast funcionar) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Script personalizado (deve vir depois do Bootstrap JS) -->
    <script src="teste.js"></script>
</body>
</html>

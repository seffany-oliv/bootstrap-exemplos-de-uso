<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Bootstrap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<!-- Construindo Slider "carroussel"do zero -->
    <div class="container mt-3">
        <div id="carouselExemplo" class="carousel slide" dta-bs-ride="carousel">
            <div class="carousel-inner">
                <!-- Primeiro item do carrousel -->
                <div class="carousel-item active">
                    <img src="https://placehold.co/600x400/000/fff" alt="Slide-1" class="d-block w-100">
                </div>
                <!-- Segundo item do carrousel -->
                <div class="carousel-item">
                    <img src="https://placehold.co/600x400/orange/fff" alt="Slide-2" class="d-block w-100">
                </div>
                <!-- Terceiro item do carrousel -->
                <div class="carousel-item">
                    <img src="https://placehold.co/600x400/gray/000" alt="Slide-3" class="d-block w-100">
                </div>
            </div>

            <!-- Adicionando Botões de controle do Carroussel -->
             <button class="carousel-control-prev" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
             </button>

             <!--  -->
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExemplo" data-bs-slide="prev">
                <span class="carousel-control-next-icon"></span>
             </button>
        </div>
    </div>

    

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
